<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  QUESTION ||--o{ RESPONSE : "asked in"
  LLM_TARGET ||--o{ RESPONSE : "answered by"
  RUN ||--o{ RESPONSE : "batches"
  RUN ||--o{ AUDIT_LOG : "logs"
  RESPONSE ||--o{ SCORING_RECORD : "scored, versioned"
  SCORING_RECORD ||--o{ ALERT : "raises"
  QUESTION {
    string question_id PK
    string question_text
    enum persona
    string therapeutic_area
    string brand_focus
    enum domain
    boolean active
    enum approval_status
    string approver_name
    int version
    timestamp created_at
    timestamp updated_at
  }
  LLM_TARGET {
    string target_id PK
    string llm_name
    string model_version
    string endpoint
    float temperature
    int max_tokens
    int rpm_limit
    int tpm_limit
    string personas
    boolean active
  }
  RUN {
    string run_id PK
    enum trigger_type
    timestamp started_at
    timestamp ended_at
    int questions_attempted
    int responses_captured
    int failure_count
    int total_tokens
    float est_cost
  }
  RESPONSE {
    uuid response_id PK
    string run_id FK
    string question_id FK
    string target_id FK
    timestamp timestamp_utc
    string llm_name
    string llm_model_version
    enum persona
    string therapeutic_area
    string brand_focus
    enum domain
    text response_text
    int response_tokens
    enum finish_reason
    enum status
    boolean alert_triggered
    timestamp created_at
  }
  SCORING_RECORD {
    uuid score_id PK
    uuid response_id FK
    float sentiment_score
    enum competitive_position
    json brand_mentions
    json key_claims
    text scoring_rationale
    string scorer_model
    int version
    boolean is_human_override
    timestamp created_at
  }
  ALERT {
    uuid alert_id PK
    uuid score_id FK
    uuid response_id FK
    enum rule_fired
    string reason
    timestamp created_at
  }
  AUDIT_LOG {
    uuid audit_id PK
    string run_id FK
    enum event_type
    string target
    timestamp ts
    int http_status
    string detail
  }`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
