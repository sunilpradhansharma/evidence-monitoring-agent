{# Shared inline styles — kept in one partial so the static export and the served app match. #}
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0; padding: 0 1.5rem 3rem; line-height: 1.45; color: #1b1b1b; background: #fafafa;
  }
  h1 { font-size: 1.4rem; margin: 1.2rem 0 0.2rem; }
  h2 { font-size: 1.1rem; margin: 1.6rem 0 0.6rem; border-bottom: 2px solid #e3e3e3; padding-bottom: 0.3rem; }
  .muted { color: #666; font-size: 0.85rem; }
  table { border-collapse: collapse; width: 100%; margin: 0.4rem 0 1rem; font-size: 0.9rem; }
  th, td { border: 1px solid #ddd; padding: 0.35rem 0.55rem; text-align: left; }
  th { background: #f0f0f0; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .bar { display: inline-block; height: 0.7rem; background: #4a7; border-radius: 2px; vertical-align: middle; }
  .pos { color: #197d2c; } .neg { color: #b00020; } .neu { color: #777; }
  .sev-3 { color: #b00020; font-weight: 700; }
  .sev-2 { color: #c46a00; font-weight: 600; }
  .sev-1 { color: #8a6d00; }
  details { border: 1px solid #ddd; border-radius: 4px; padding: 0.5rem 0.7rem; margin: 0.4rem 0; background: #fff; }
  details summary { cursor: pointer; font-weight: 600; }
  details .body { margin-top: 0.6rem; white-space: pre-wrap; }
  .empty { color: #888; font-style: italic; padding: 0.4rem 0; }
  form.filters { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: end; margin: 0.5rem 0 1rem; }
  form.filters label { display: flex; flex-direction: column; font-size: 0.78rem; color: #555; }
  form.filters select, form.filters input, .approve-form input {
    padding: 0.3rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem;
  }
  button { padding: 0.35rem 0.8rem; border: 1px solid #888; border-radius: 4px; background: #fff; cursor: pointer; font-size: 0.85rem; }
  button.primary { background: #197d2c; color: #fff; border-color: #197d2c; }
  button.danger { background: #b00020; color: #fff; border-color: #b00020; }
  nav.tabs { display: flex; gap: 0.3rem; border-bottom: 2px solid #ddd; margin-top: 1rem; }
  nav.tabs a { padding: 0.5rem 1rem; text-decoration: none; color: #444; border: 1px solid transparent; border-bottom: none; border-radius: 6px 6px 0 0; }
  nav.tabs a.active { background: #fff; border-color: #ddd; font-weight: 600; color: #000; }
  nav.tabs a.disabled { color: #aaa; cursor: not-allowed; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 0.8rem 1rem; margin: 0.6rem 0; }
  .pill { display: inline-block; background: #eef; border-radius: 10px; padding: 0.05rem 0.5rem; font-size: 0.75rem; }
</style>
