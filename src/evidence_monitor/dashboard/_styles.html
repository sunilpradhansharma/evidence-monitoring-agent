{# Shared inline styles — one partial so the static export and the served app match.
   Clinical, confident, dependency-light: layered surfaces, crisp borders, saturated
   status colours, clear type scale, generous spacing. No gradients on content, no JS framework. #}
<style>
  :root {
    /* Ink + neutrals */
    --ink: #16202b;
    --ink-soft: #5a6675;
    --ink-faint: #8a95a3;
    --line: #e3e8ee;            /* hairline */
    --line-strong: #cfd6df;     /* emphasised border */
    --surface: #ffffff;
    --surface-2: #f7f9fb;       /* subtle inset panel */
    --bg: #eef1f5;              /* page */

    /* Brand accent — confident clinical blue */
    --accent: #155a8a;
    --accent-ink: #0e4068;
    --accent-soft: #e8f1f9;
    --accent-line: #b9d4e8;

    /* Status — saturated fills, dark ink, clear tint backgrounds */
    --good: #157a43;        --good-ink: #0c5a30;  --good-soft: #e0f3e7;  --good-line: #a9dcbd;
    --warn: #9a5b00;        --warn-ink: #7a4700;  --warn-soft: #fbeed5;  --warn-line: #f0cf94;
    --bad:  #b21f33;        --bad-ink: #8a1626;   --bad-soft: #fbe4e7;   --bad-line: #f1bcc4;
    --wrong:#6a39a8;        --wrong-ink:#4f2982;  --wrong-soft:#efe8fa;  --wrong-line:#d3bff0;
    --neutral: #5f6b78;     --neutral-soft:#e9edf1; --neutral-line:#cfd6df;

    --radius: 12px;
    --radius-sm: 8px;
    --shadow-sm: 0 1px 2px rgba(16,32,48,0.05), 0 1px 1px rgba(16,32,48,0.04);
    --shadow: 0 1px 3px rgba(16,32,48,0.06), 0 4px 12px rgba(16,32,48,0.05);
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0; padding: 0 1.5rem 5rem; line-height: 1.55; color: var(--ink);
    background: var(--bg); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    font-size: 15px;
  }
  .wrap { max-width: 1180px; margin: 0 auto; width: 100%; }

  /* ---------- Masthead ---------- */
  .masthead { padding: 1.9rem 0 0.5rem; }
  .masthead h1 {
    font-size: 1.6rem; font-weight: 700; margin: 0; letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 0.6rem; color: var(--ink);
  }
  .masthead .logo {
    width: 30px; height: 30px; flex: 0 0 auto; color: #fff; background: var(--accent);
    border-radius: 9px; padding: 5px; box-shadow: var(--shadow-sm);
  }
  .masthead .lede { color: var(--ink-soft); font-size: 0.98rem; margin: 0.55rem 0 0; max-width: 72ch; }

  h2 { font-size: 1.18rem; font-weight: 700; margin: 2.1rem 0 0.15rem; letter-spacing: -0.01em; color: var(--ink); }
  h3 { font-size: 0.82rem; font-weight: 700; color: var(--ink-soft); margin: 1.05rem 0 0.35rem;
       text-transform: uppercase; letter-spacing: 0.04em; }
  .section-note { color: var(--ink-soft); font-size: 0.9rem; margin: 0.2rem 0 1rem; max-width: 80ch; }
  .muted { color: var(--ink-soft); font-size: 0.88rem; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ---------- Tabs ---------- */
  nav.tabs { display: flex; gap: 0.3rem; border-bottom: 2px solid var(--line); margin-top: 1.4rem; }
  nav.tabs a {
    padding: 0.6rem 1.15rem; color: var(--ink-soft); font-size: 0.95rem; font-weight: 600;
    border-bottom: 2px solid transparent; margin-bottom: -2px; border-radius: 6px 6px 0 0;
  }
  nav.tabs a:hover { color: var(--ink); text-decoration: none; background: var(--accent-soft); }
  nav.tabs a.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

  /* ---------- Cards & surfaces ---------- */
  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 1.05rem 1.2rem; margin: 0.75rem 0; box-shadow: var(--shadow-sm);
  }

  /* ---------- Headline band ---------- */
  .headline {
    background: linear-gradient(0deg, var(--surface), var(--surface));
    border: 1px solid var(--accent-line); border-left: 5px solid var(--accent);
    border-radius: var(--radius); padding: 1.05rem 1.3rem; margin: 1.2rem 0 0.5rem; box-shadow: var(--shadow-sm);
  }
  .headline p { margin: 0; font-size: 1.08rem; line-height: 1.5; color: var(--ink); font-weight: 500; }
  .headline .why { color: var(--ink-soft); font-size: 0.9rem; margin-top: 0.35rem; font-weight: 400; }

  /* ---------- Metric cards grid ---------- */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(165px, 1fr));
             gap: 0.8rem; margin: 0.6rem 0 0.8rem; }
  .metric {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 1.05rem 1.1rem; box-shadow: var(--shadow-sm); min-height: 96px;
    position: relative; overflow: hidden;
  }
  .metric::before { content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background: var(--neutral-line); }
  .metric .k { font-size: 0.74rem; color: var(--ink-soft); font-weight: 700; letter-spacing: 0.05em;
               text-transform: uppercase; }
  .metric .v { font-size: 2rem; font-weight: 760; margin-top: 0.35rem; line-height: 1.05;
               font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .metric .sub { font-size: 0.78rem; color: var(--ink-soft); margin-top: 0.35rem; }
  .metric.good  { background: var(--good-soft);  border-color: var(--good-line); }
  .metric.good::before  { background: var(--good); }
  .metric.good .v { color: var(--good-ink); }
  .metric.warn  { background: var(--warn-soft);  border-color: var(--warn-line); }
  .metric.warn::before  { background: var(--warn); }
  .metric.warn .v { color: var(--warn-ink); }
  .metric.bad   { background: var(--bad-soft);   border-color: var(--bad-line); }
  .metric.bad::before   { background: var(--bad); }
  .metric.bad .v { color: var(--bad-ink); }

  .runline { color: var(--ink-soft); font-size: 0.84rem; margin: 0.6rem 0 0.2rem;
             font-variant-numeric: tabular-nums; }
  .runline code { background: var(--surface-2); border: 1px solid var(--line); border-radius: 5px;
                  padding: 0.06rem 0.4rem; color: var(--ink); font-size: 0.82rem; }

  /* ---------- Tables ---------- */
  table { border-collapse: separate; border-spacing: 0; width: 100%; margin: 0.45rem 0 1.1rem;
          font-size: 0.9rem; background: var(--surface); border: 1px solid var(--line);
          border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
  th, td { padding: 0.55rem 0.75rem; text-align: left; border-bottom: 1px solid var(--line); }
  thead th { background: var(--surface-2); font-weight: 700; color: var(--ink); font-size: 0.8rem;
             text-transform: uppercase; letter-spacing: 0.03em; }
  tbody tr:last-child td { border-bottom: none; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr:hover { background: var(--accent-soft); }

  /* ---------- Sentiment mini-bars ---------- */
  .sbar-wrap { display: inline-flex; align-items: center; gap: 0.55rem; width: 100%; }
  .sbar-track { position: relative; flex: 1; height: 0.7rem; background: var(--neutral-soft);
                border-radius: 5px; overflow: hidden; min-width: 90px; }
  .sbar-mid { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--line-strong); z-index: 1; }
  .sbar-fill { position: absolute; top: 0; bottom: 0; border-radius: 5px; }
  .sbar-fill.pos { background: var(--good); }
  .sbar-fill.neg { background: var(--bad); }
  .sbar-fill.neu { background: var(--neutral); }
  .sval { font-variant-numeric: tabular-nums; min-width: 3.2rem; text-align: right; font-size: 0.86rem; font-weight: 600; }

  /* ---------- Volume bars ---------- */
  .bar { display: inline-block; height: 0.75rem; background: var(--accent); border-radius: 4px; vertical-align: middle; }

  .pos { color: var(--good); } .neg { color: var(--bad); } .neu { color: var(--neutral); }
  .sev-3 { color: var(--wrong); font-weight: 700; }
  .sev-2 { color: var(--warn); font-weight: 700; }
  .sev-1 { color: var(--warn-ink); }

  /* ---------- Coverage map (question x model heatmap) ---------- */
  .coverage { overflow-x: auto; margin: 0.4rem 0 0.5rem; }
  table.heat { table-layout: fixed; border-collapse: separate; border-spacing: 5px; width: 100%;
               background: transparent; border: none; box-shadow: none; }
  table.heat th { background: transparent; border: none; padding: 0.2rem 0.5rem 0.5rem;
                  text-transform: none; letter-spacing: 0; }
  table.heat th.qcol { width: 30%; text-align: left; color: var(--ink-soft); font-size: 0.82rem; font-weight: 700; }
  table.heat th.mcol { text-align: center; font-size: 0.84rem; word-break: break-word; color: var(--ink);
                       font-weight: 700; }
  table.heat td { border-bottom: none; padding: 0; }
  table.heat td.qlabel {
    border: 1px solid var(--line); background: var(--surface); border-radius: var(--radius-sm);
    padding: 0.5rem 0.7rem; font-size: 0.86rem; vertical-align: middle; line-height: 1.35;
  }
  table.heat td.qlabel .muted { font-weight: 700; color: var(--ink); font-size: 0.8rem; }
  table.heat td.cell {
    text-align: center; padding: 0; height: 2.8rem; position: relative;
    border-radius: var(--radius-sm);
  }
  table.heat td.cell a, table.heat td.cell span.cellspan {
    display: flex; align-items: center; justify-content: center; width: 100%; height: 100%;
    color: inherit; text-decoration: none; font-size: 0.83rem; font-weight: 700; padding: 0 0.3rem;
    border-radius: var(--radius-sm); border: 1px solid transparent;
  }
  table.heat td.cell a:hover { outline: 2px solid var(--accent); outline-offset: -2px; text-decoration: none; }
  .cell.favorable a, .cell.favorable .cellspan { background: var(--good-soft); color: var(--good-ink); border-color: var(--good-line); }
  .cell.partial   a, .cell.partial .cellspan   { background: var(--warn-soft); color: var(--warn-ink); border-color: var(--warn-line); }
  .cell.negative  a, .cell.negative .cellspan  { background: var(--bad-soft);  color: var(--bad-ink);  border-color: var(--bad-line); }
  .cell.absent    a, .cell.absent .cellspan    { background: var(--neutral-soft); color: var(--neutral); border-color: var(--neutral-line); }
  .cell.wrong_indication a, .cell.wrong_indication .cellspan { background: var(--wrong-soft); color: var(--wrong-ink); border-color: var(--wrong-line); }
  .cell.nodata .cellspan, .cell.nodata a {
    background: var(--surface-2); color: var(--ink-faint); border: 1px dashed var(--line-strong);
  }
  /* dashed "trunc" corner tag */
  .cell.trunc::after {
    content: "trunc"; position: absolute; top: 3px; right: 4px; font-size: 0.58rem; line-height: 1;
    font-weight: 700; color: var(--warn-ink); border: 1px dashed var(--warn); border-radius: 3px;
    padding: 1px 3px; background: rgba(255,255,255,0.85); z-index: 2;
  }

  .legend { display: flex; flex-wrap: wrap; gap: 0.5rem 1.2rem; margin: 0.5rem 0 0.7rem; font-size: 0.82rem; color: var(--ink-soft); }
  .legend .item { display: inline-flex; align-items: center; gap: 0.4rem; }
  .legend .sw { width: 0.95rem; height: 0.95rem; border-radius: 4px; border: 1px solid var(--line-strong); }
  .legend .sw.favorable { background: var(--good-soft); border-color: var(--good-line); }
  .legend .sw.partial { background: var(--warn-soft); border-color: var(--warn-line); }
  .legend .sw.negative { background: var(--bad-soft); border-color: var(--bad-line); }
  .legend .sw.absent { background: var(--neutral-soft); border-color: var(--neutral-line); }
  .legend .sw.nodata { background: var(--surface-2); border: 1px dashed var(--line-strong); }
  .legend .sw.wrong_indication { background: var(--wrong-soft); border-color: var(--wrong-line); }

  /* ---------- Disclosure / drill-down ---------- */
  details {
    border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 0.65rem 0.95rem; margin: 0.5rem 0;
    background: var(--surface); box-shadow: var(--shadow-sm);
  }
  details summary { cursor: pointer; font-weight: 650; color: var(--ink); }
  details summary:hover { color: var(--accent); }
  details .body { margin-top: 0.65rem; white-space: pre-wrap; font-size: 0.9rem; }
  .howto { background: var(--accent-soft); border-color: var(--accent-line); }
  .howto summary { color: var(--accent-ink); }
  .howto dl { margin: 0.5rem 0 0; display: grid; grid-template-columns: max-content 1fr; gap: 0.35rem 1rem; }
  .howto dt { font-weight: 700; font-size: 0.84rem; color: var(--ink); }
  .howto dd { margin: 0; font-size: 0.84rem; color: var(--ink-soft); }

  .empty { color: var(--ink-soft); font-style: italic; padding: 0.5rem 0; }

  /* ---------- Forms ---------- */
  form.filters {
    display: flex; flex-wrap: wrap; gap: 0.7rem; align-items: end; margin: 0.7rem 0 1.1rem;
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 0.9rem 1rem; box-shadow: var(--shadow-sm);
  }
  form.filters label { display: flex; flex-direction: column; font-size: 0.74rem; color: var(--ink-soft);
                       gap: 0.25rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
  form.filters select, form.filters input, .approve-form input, .card input[type="text"], input[type="text"], input[type="date"], select {
    padding: 0.46rem 0.6rem; border: 1px solid var(--line-strong); border-radius: 8px; font-size: 0.9rem;
    background: var(--surface); color: var(--ink); font-family: inherit;
  }
  select:focus, input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  button {
    padding: 0.46rem 1.05rem; border: 1px solid var(--line-strong); border-radius: 8px; background: var(--surface);
    cursor: pointer; font-size: 0.89rem; font-weight: 650; color: var(--ink); font-family: inherit;
    transition: background 0.12s ease;
  }
  button:hover { background: var(--surface-2); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: var(--accent-ink); }
  button.danger { background: var(--bad); color: #fff; border-color: var(--bad); }
  button.danger:hover { background: var(--bad-ink); }
  button:disabled, button[disabled] { opacity: 0.4; cursor: not-allowed; }

  /* ---------- Pills / chips ---------- */
  .pill {
    display: inline-block; background: var(--accent-soft); color: var(--accent-ink); border: 1px solid var(--accent-line);
    border-radius: 999px; padding: 0.12rem 0.6rem; font-size: 0.75rem; font-weight: 700;
  }
  .pill.good { background: var(--good-soft); color: var(--good-ink); border-color: var(--good-line); }
  .pill.warn { background: var(--warn-soft); color: var(--warn-ink); border-color: var(--warn-line); }
  .pill.bad  { background: var(--bad-soft); color: var(--bad-ink); border-color: var(--bad-line); }
  .pill.wrong { background: var(--wrong-soft); color: var(--wrong-ink); border-color: var(--wrong-line); }

  /* ---------- Banners ---------- */
  .banner {
    border: 1px solid var(--accent-line); background: var(--accent-soft); border-left: 5px solid var(--accent);
    border-radius: var(--radius); padding: 0.85rem 1.1rem; margin: 1rem 0; font-size: 0.9rem; color: var(--ink);
  }
  .banner .b-title { font-weight: 700; color: var(--accent-ink); }

  /* ---------- Stat strip (citation counts etc.) ---------- */
  .statbar { display: flex; flex-wrap: wrap; gap: 0.65rem; margin: 0.55rem 0 0.9rem; }
  .stat { border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 0.6rem 1rem;
          background: var(--surface); font-size: 0.88rem; box-shadow: var(--shadow-sm); font-weight: 600; color: var(--ink-soft); }
  .stat b { font-size: 1.35rem; font-variant-numeric: tabular-nums; margin-right: 0.3rem; color: var(--ink); font-weight: 760; }

  /* ---------- Alerts — expanded cards ---------- */
  .alert-card {
    background: var(--surface); border: 1px solid var(--line); border-left: 5px solid var(--neutral);
    border-radius: var(--radius); padding: 0.95rem 1.1rem; margin: 0.65rem 0; box-shadow: var(--shadow-sm);
  }
  .alert-card.sev-3 { border-left-color: var(--wrong); }
  .alert-card.sev-2 { border-left-color: var(--bad); }
  .alert-card.sev-1 { border-left-color: var(--warn); }
  .alert-card .a-head { display: flex; flex-wrap: wrap; align-items: center; gap: 0.45rem; }
  .alert-card .a-id { font-weight: 760; font-size: 0.96rem; }
  .alert-card .a-q { margin: 0.55rem 0 0.25rem; font-size: 0.95rem; color: var(--ink); line-height: 1.45; }
  .alert-card .a-reasons { margin: 0.35rem 0 0; padding-left: 1.15rem; font-size: 0.87rem; color: var(--ink-soft); }
  .alert-card .a-reasons li { margin: 0.12rem 0; }
  .badge { display: inline-block; border-radius: 6px; padding: 0.14rem 0.55rem; font-size: 0.7rem;
           font-weight: 800; text-transform: uppercase; letter-spacing: 0.03em; border: 1px solid transparent; }
  .badge.sev-3 { background: var(--wrong-soft); color: var(--wrong-ink); border-color: var(--wrong-line); }
  .badge.sev-2 { background: var(--bad-soft); color: var(--bad-ink); border-color: var(--bad-line); }
  .badge.sev-1 { background: var(--warn-soft); color: var(--warn-ink); border-color: var(--warn-line); }
  .alert-card details { box-shadow: none; margin: 0.6rem 0 0; background: var(--surface-2); }

  /* ---------- Approvals — persona groups + question cards ---------- */
  .pgroup-head {
    display: flex; align-items: baseline; gap: 0.6rem; margin: 1.5rem 0 0.5rem;
    padding-bottom: 0.4rem; border-bottom: 2px solid var(--line);
  }
  .pgroup-head h3 { margin: 0; font-size: 1.02rem; color: var(--ink); text-transform: none; font-weight: 760; letter-spacing: -0.01em; }
  .pgroup-head .count { color: var(--ink-soft); font-size: 0.84rem; font-weight: 600; }
  .qcard {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 1rem 1.15rem; margin: 0.6rem 0; box-shadow: var(--shadow-sm);
  }
  .qcard:hover { border-color: var(--line-strong); }
  .qcard .q-top { display: flex; flex-wrap: wrap; align-items: center; gap: 0.45rem; }
  .qcard .q-id { font-weight: 760; font-size: 0.94rem; }
  .qcard .q-text { margin: 0.55rem 0 0.8rem; font-size: 0.98rem; line-height: 1.5; color: var(--ink); }
  .qcard .approve-form { display: flex; flex-wrap: wrap; gap: 0.55rem; align-items: center; }
  .qcard .approve-form .reason { flex: 1 1 100%; width: 100%; }
  .qcard .approve-form .act-btn { min-width: 100px; }
  .tag {
    display: inline-block; background: var(--accent-soft); color: var(--accent-ink); border: 1px solid var(--accent-line);
    border-radius: 999px; padding: 0.13rem 0.65rem; font-size: 0.73rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.02em;
  }
  .tag.muted { background: var(--neutral-soft); color: var(--ink-soft); border-color: var(--neutral-line); }
</style>
