# LLM targets to monitor (Principle V — config-driven targets).
#
# Adding or removing a target is a config + adapter change only; core orchestration never changes.
# Model ids, parameters, and rate limits live HERE, never in code. This file is content-agnostic:
# it names PROVIDERS and personas only — no drug, competitor, or indication names appear anywhere.
#
# personas: which question-styles this target receives. An empty list (or all three) means the
#   target is unconditional. Open Evidence is the only conditional target: PROVIDER-persona only,
#   and active only when its API access is confirmed (FR-007).
# prices: USD per 1,000 tokens, consumed by observability/cost.py for run-cost estimation.

targets:
  - target_id: openai-gpt4o
    llm_name: openai-gpt4o
    model_version: gpt-4o-2024-08-06
    endpoint: null
    temperature: 0.0
    max_tokens: 1024
    rpm_limit: 60
    tpm_limit: 90000
    personas: [PROSPECT, PROVIDER, PATIENT]
    active: true
    tos_acknowledged: true
    kind: llm
    prices:
      input_per_1k: 0.0025
      output_per_1k: 0.01

  - target_id: google-gemini
    llm_name: google-gemini
    model_version: gemini-2.5-flash
    endpoint: null
    temperature: 0.0
    # gemini-2.5-flash is a thinking model: its internal thinking tokens are billed as output and
    # count against max_output_tokens. The primary fix is in the adapter — thinking is disabled
    # (thinking_budget=0) so the whole budget goes to the visible answer, matching GPT-4o/Claude and
    # keeping cost flat. This modest bump above 1024 is belt-and-suspenders headroom for long answers.
    max_tokens: 2048
    rpm_limit: 60
    tpm_limit: 90000
    personas: [PROSPECT, PROVIDER, PATIENT]
    active: true
    tos_acknowledged: true
    kind: llm
    prices:
      input_per_1k: 0.00125
      output_per_1k: 0.005

  - target_id: anthropic-claude-target
    llm_name: anthropic-claude-target
    model_version: claude-sonnet-4-6
    endpoint: null
    temperature: 0.0
    max_tokens: 1024
    rpm_limit: 50
    tpm_limit: 80000
    personas: [PROSPECT, PROVIDER, PATIENT]
    active: true
    tos_acknowledged: true
    kind: llm
    prices:
      input_per_1k: 0.003
      output_per_1k: 0.015

  # The real commercial clinical-evidence provider API (kind: provider-api). Conditional:
  # Provider-persona only, and only when API access is confirmed. Left inactive by default so its
  # absence never counts against the capture rate. When activated it is a FIRST-CLASS production
  # provider (not synthesis, not a dev stand-in).
  - target_id: open-evidence
    llm_name: open-evidence
    model_version: open-evidence-v1
    endpoint: null
    temperature: 0.0
    max_tokens: 1024
    rpm_limit: 30
    tpm_limit: 40000
    personas: [PROVIDER]
    active: false
    tos_acknowledged: false
    kind: provider-api
    prices:
      input_per_1k: 0.0
      output_per_1k: 0.0

  # "Synthesized Evidence" (kind: synthesis) — a literature-synthesis target shown first-class
  # alongside the LLMs. It synthesizes PUBLISHED medical literature from public PubMed (E-utilities)
  # using Claude: step 1 searches PubMed for the question; step 2 has Claude write a PMID-cited
  # answer from those abstracts. It is NOT Open Evidence and uses NO Open Evidence data; its output
  # is its own. Provider-persona only (so it has no answer for prospect/patient questions).
  - target_id: provider-evidence-dev
    llm_name: provider-evidence-dev
    model_version: pubmed-eutils+claude-synthesis
    endpoint: null
    temperature: 0.0
    max_tokens: 1024
    rpm_limit: 60  # NCBI policy: ~3 requests/sec without an api_key; one submit = 2 calls
    tpm_limit: 90000
    personas: [PROVIDER]
    active: true
    tos_acknowledged: true
    kind: synthesis
    display_name: "Synthesized Evidence"
    prices:
      input_per_1k: 0.0
      output_per_1k: 0.0
